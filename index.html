<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Español para Jóvenes | Edición Cyberpunk</title>
    <!-- Fuentes de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           VARIABLES DE DISEÑO Y TEMAS
           ========================================================================== */
        :root {
            --bg-color: #b28cd6;
            --dark-color: #3b3247;
            --light-color: #ffffff;
            --accent-color: #e55934;
            --card-bg: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.9);
            --font-title: 'Bebas Neue', sans-serif;
            --font-body: 'Open Sans', sans-serif;
            --soft-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            --card-border: 1px solid rgba(255, 255, 255, 0.4);
            --neon-glow: none;
        }

        body.dark-mode {
            --bg-color: #0d0221;
            --dark-color: #00f2ff;
            --light-color: #1a1a2e;
            --accent-color: #ff0055;
            --card-bg: rgba(0, 242, 255, 0.05);
            --text-main: #00f2ff;
            --input-bg: #1a1a2e;
            --neon-glow: 0 0 10px rgba(0, 242, 255, 0.5);
            --soft-shadow: 0 8px 30px rgba(0, 242, 255, 0.2);
            --card-border: 1px solid rgba(0, 242, 255, 0.3);
        }

        /* ==========================================================================
           SCROLL NATIVO Y CONFIGURACIÓN BASE
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease; }
        
        html, body { min-height: 100%; overflow-x: hidden; overflow-y: auto; scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-body); display: flex; flex-direction: column; }
        button { cursor: pointer; border: none; outline: none; background: none; font-family: inherit; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; padding: 100px 20px 120px 20px; z-index: 10; }

        .tab-content { display: none; width: 100%; max-width: 850px; flex-direction: column; align-items: center; }
        .tab-content.active { display: flex; animation: slideUpFade 0.6s forwards; }
        .sub-view { display: none; width: 100%; flex-direction: column; align-items: center; }
        .sub-view.active { display: flex; animation: slideUpFade 0.5s forwards; }

        /* ==========================================================================
           ESTILOS GENERALES
           ========================================================================== */
        .main-title { font-family: var(--font-title); font-size: 5rem; letter-spacing: 4px; margin-bottom: 20px; text-transform: uppercase; text-align: center; line-height: 1; }
        body.dark-mode .main-title { text-shadow: var(--neon-glow); }

        .auth-box, .avatar-creator-box { background: var(--card-bg); backdrop-filter: blur(15px); padding: 40px; border-radius: 24px; border: var(--card-border); text-align: center; box-shadow: var(--soft-shadow); width: 100%; max-width: 500px; margin: 0 auto 20px auto; }
        .avatar-creator-box { max-width: 850px; }
        
        input[type="text"], textarea { width: 100%; padding: 15px 20px; border-radius: 12px; border: 2px solid rgba(255, 255, 255, 0.2); background-color: var(--input-bg); color: var(--dark-color); font-size: 1.1rem; font-weight: 600; outline: none; margin-bottom: 15px; }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent-color); box-shadow: var(--soft-shadow); }

        .footer-pill { background: var(--accent-color); color: white; padding: 15px 35px; border-radius: 50px; font-weight: 800; text-transform: uppercase; box-shadow: 0 6px 20px rgba(229, 89, 52, 0.4); width: 100%; border: none; font-size: 1.1rem; cursor: pointer; transition: transform 0.2s; }
        .footer-pill:active { transform: scale(0.95); }
        .footer-pill:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .audio-btn { background: var(--light-color); color: var(--bg-color); border: none; border-radius: 50%; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; box-shadow: var(--soft-shadow); transition: transform 0.2s; }
        .audio-btn:hover { transform: scale(1.1); }

        /* ==========================================================================
           ANIMACIONES INTERNAS DE LOS AVATARES SVG Y CORAZONES
           ========================================================================== */
        .hero-float { animation: heroFloat 4s ease-in-out infinite; transform-origin: center; }
        .hero-float-fast { animation: heroFloat 2s ease-in-out infinite; transform-origin: center; }
        .hero-breathe { animation: heroBreathe 3s ease-in-out infinite; transform-origin: bottom center; }
        .hero-pulse { animation: heroPulse 2s infinite; }
        .hero-blink { animation: heroBlink 4s infinite; transform-origin: center; }
        
        @keyframes heroFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        @keyframes heroBreathe { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.02) translateY(-2px); } }
        @keyframes heroPulse { 0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 2px currentColor); } 50% { opacity: 1; filter: drop-shadow(0 0 12px currentColor); } }
        @keyframes heroBlink { 0%, 96%, 98%, 100% { transform: scaleY(1); } 97% { transform: scaleY(0.1); } }

        .heart { position: absolute; font-size: 2rem; pointer-events: none; z-index: 100; animation: floatHeart 1.5s ease-out forwards; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        @keyframes floatHeart { 0% { opacity: 1; transform: translateY(0) scale(0.5); } 50% { transform: translateY(-50px) scale(1.2); } 100% { opacity: 0; transform: translateY(-100px) scale(1); } }

        /* Selector de Avatares */
        .avatar-creator-grid { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        .avatar-preview-container { width: 220px; height: 220px; border-radius: 30px; overflow: visible; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%); display: flex; justify-content: center; align-items: center; position: relative; }
        
        .avatar-selection-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; width: 100%; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; max-height: 40vh; overflow-y: auto; border: var(--card-border); }
        .avatar-selection-list::-webkit-scrollbar { width: 8px; }
        .avatar-selection-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .avatar-selection-list::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }

        .avatar-option { width: 100%; aspect-ratio: 1/1; border-radius: 16px; background: rgba(255,255,255,0.1); overflow: visible; cursor: pointer; border: 3px solid transparent; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .avatar-option-name { font-size: 0.75rem; font-weight: bold; margin-top: 5px; opacity: 0.8; text-transform: uppercase; text-align: center; }
        .avatar-option:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
        .avatar-option.selected { border-color: var(--accent-color); background: rgba(255,255,255,0.25); transform: scale(1.15); box-shadow: 0 0 20px var(--accent-color); z-index: 11; }

        /* ==========================================================================
           SISTEMA DE CHROMAS (SKINS)
           ========================================================================== */
        .chroma-container { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.3); padding: 15px 25px; border-radius: 20px; width: 100%; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .chroma-title { font-size: 0.9rem; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; color: var(--accent-color); letter-spacing: 1px; }
        .chroma-list { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .chroma-btn { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s; position: relative; }
        .chroma-btn:hover { transform: scale(1.2); }
        .chroma-btn.selected { border-color: #ffffff; box-shadow: 0 0 15px currentColor; transform: scale(1.2); z-index: 5; }

        /* ==========================================================================
           NAVEGACIÓN Y TOP BANNER
           ========================================================================== */
        .top-banner { position: fixed; top: 20px; right: 20px; background: rgba(30, 30, 30, 0.85); color: #fff; padding: 10px 20px; border-radius: 30px; z-index: 1000; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--accent-color); backdrop-filter: blur(10px); }
        .theme-switch { width: 44px; height: 22px; background: #555; border-radius: 20px; position: relative; cursor: pointer; }
        .theme-switch::before { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        body.dark-mode .theme-switch { background: var(--accent-color); }
        body.dark-mode .theme-switch::before { left: 24px; }

        .nav-left { position: fixed; left: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        .circle-btn { width: 60px; height: 60px; border-radius: 50%; background-color: var(--light-color); color: var(--bg-color); display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 2px solid transparent; transform-origin: left center; }
        .circle-btn:hover { transform: scale(1.3); z-index: 10; }
        .circle-btn.active { background-color: var(--accent-color); color: white; transform: scale(1.1); }

        /* ==========================================================================
           DICCIONARIO, TABLÓN Y MINI-AVATARES
           ========================================================================== */
        .search-container { display: flex; gap: 15px; width: 100%; margin-bottom: 30px; align-items: center; }
        .dict-avatar { width: 75px; height: 75px; border-radius: 50%; padding: 5px; border: 2px solid var(--accent-color); flex-shrink: 0; box-shadow: var(--soft-shadow); transition: transform 0.3s; background: var(--card-bg); display: flex; justify-content: center; align-items: center; }
        .dict-avatar svg { width: 100%; height: 100%; }

        .vocab-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .vocab-card { background: var(--card-bg); border: var(--card-border); padding: 30px; border-radius: 24px; width: 100%; text-align: left; backdrop-filter: blur(10px); animation: slideUpFade 0.4s forwards; }
        .dict-badge { display: inline-block; padding: 5px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; margin-right: 5px; background: rgba(255,255,255,0.2); color: #fff; }
        
        .muro-layout { display: flex; gap: 20px; align-items: flex-start; width: 100%; }
        .muro-avatar-wrapper { width: 120px; height: 120px; flex-shrink: 0; position: relative; background: var(--card-bg); border: var(--card-border); border-radius: 20px; display: flex; justify-content: center; align-items: center; padding: 10px; box-shadow: var(--soft-shadow); }
        .muro-avatar-wrapper svg { width: 100%; height: 100%; }
        .muro-paper { background: #fdfbf7; color: #2c2c2c; padding: 40px; border-radius: 12px; box-shadow: var(--soft-shadow); width: 100%; position: relative; flex: 1; }
        body.dark-mode .muro-paper { background: #1a1a2e; color: #e0e0e0; border: var(--card-border); }
        .muro-paper::before { content: ''; position: absolute; top: 0; bottom: 0; left: 25px; width: 2px; background: rgba(229, 89, 52, 0.3); }
        
        .admin-panel { border: 2px dashed #ff0055; background: rgba(255, 0, 85, 0.05); padding: 30px; border-radius: 16px; width: 100%; text-align: left; }
        
        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; padding: 20px; background: rgba(0,0,0,0.05); border-radius: 12px; border: 2px dashed rgba(0,0,0,0.2); justify-content: center; min-height: 80px; }
        
        /* ESTILOS DE ARRASTRAR Y SOLTAR MEJORADOS */
        .draggable-word { background: var(--accent-color); color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: transform 0.2s, box-shadow 0.2s; user-select: none; }
        .word-selected { box-shadow: 0 0 0 3px #fff, 0 0 15px var(--accent-color) !important; transform: scale(1.15); z-index: 10; }
        .drop-zone { display: inline-flex; min-width: 120px; height: 38px; background: rgba(0,0,0,0.1); border-radius: 8px; margin: 0 5px; vertical-align: middle; cursor: pointer; transition: background 0.2s, border 0.2s; border: 2px dashed rgba(0,0,0,0.2); justify-content: center; align-items: center; }
        body.dark-mode .drop-zone { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .drop-zone:hover { background: rgba(229, 89, 52, 0.2) !important; border-color: var(--accent-color); }
        .drop-zone.filled { background: transparent; border-style: solid; border-color: transparent; }

        /* ==========================================================================
           ANIMACIONES GENERALES
           ========================================================================== */
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .emoji-interactive { display: inline-block; transition: transform 0.3s; }
        .emoji-interactive:hover { transform: scale(1.3) rotate(10deg); cursor: pointer; }
        
        .lightning-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: transparent; pointer-events: none; z-index: 9999; }
        .lightning-active { animation: lightningFlash 0.5s forwards; }
        @keyframes lightningFlash { 0%, 100% { background: transparent; } 10% { background: rgba(0, 242, 255, 0.8); } 25% { background: rgba(255, 0, 85, 0.7); } }
        
        .soft-fade-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; pointer-events: none; z-index: 9999; background: #b28cd6; opacity: 0; transition: opacity 0.8s; }
        .soft-fade-active { opacity: 1; }

        /* ==========================================================================
           RESPONSIVE MOBILE
           ========================================================================== */
        @media (max-width: 768px) {
            .main-title { font-size: 3.5rem; margin-top: 10px; }
            .avatar-preview-container { width: 160px; height: 160px; }
            .avatar-selection-list { grid-template-columns: repeat(3, 1fr); padding: 15px; gap: 10px; max-height: 40vh; }
            
            .top-banner { position: fixed; top: 0; left: 0; width: 100%; border-radius: 0; justify-content: space-between; padding: 12px 20px; border-left: none; border-bottom: 2px solid var(--accent-color); }
            .top-banner span:last-child { display: none; }
            
            main { padding: 80px 15px 120px 15px; } 

            .nav-left { position: fixed; bottom: 0; top: auto; left: 0; width: 100%; transform: none; flex-direction: row; justify-content: space-evenly; background: rgba(255, 255, 255, 0.95); padding: 15px 10px; border-top: 1px solid rgba(0,0,0,0.1); box-shadow: 0 -5px 10px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }
            body.dark-mode .nav-left { background: rgba(26, 26, 46, 0.98); border-top-color: #333; }
            .circle-btn { width: 45px; height: 45px; background: #f0f0f0; }
            .circle-btn:hover { transform: scale(1.1) !important; }

            .search-container { flex-direction: column; width: 100%; gap: 10px; }
            .search-container input { width: 100%; margin-bottom: 5px !important; }
            .search-container button { width: 100%; }
            .dict-avatar { margin: 10px auto; }
            
            .muro-layout { flex-direction: column; align-items: center; text-align: center; }
            .muro-avatar-wrapper { margin: 0 auto; width: 100px; height: 100px; }
            .muro-paper::before { display: none; }
        }
    </style>
</head>
<body id="main-body">

    <div id="lightning-overlay" class="lightning-overlay"></div>
    <div id="soft-fade-overlay" class="soft-fade-overlay"></div>

    <div class="top-banner">
        <span>CYBERPUNK MODE:</span>
        <div class="theme-switch" onclick="toggleTheme()"></div>
        <button id="top-reset-btn" onclick="resetProfile()" style="display:none; font-size:0.8rem; color:#ff4444; border:1px solid #ff4444; border-radius:10px; padding: 4px 8px; background:rgba(255,0,0,0.1); cursor:pointer; font-weight:bold; margin-left: 10px;">REINICIAR SISTEMA</button>
    </div>

    <nav class="nav-left">
        <button class="circle-btn nav-btn active" data-tab="inicio"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
        <button class="circle-btn nav-btn" data-tab="diccionario"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4V9h4v2zm0-4h-4V5h4v2zm-6 4H9V9h4v2zm0-4H9V5h4v2z"/></svg></button>
        <button class="circle-btn nav-btn" data-tab="notas"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 14H7v-2h10v2zm0-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></button>
        <button class="circle-btn nav-btn" data-tab="juegos"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg></button>
    </nav>

    <main id="main-content">
        
        <!-- INICIO -->
        <div id="inicio" class="tab-content active">
            <div id="view-login" class="sub-view active">
                <div class="auth-box">
                    <h1 class="main-title">BIENVENIDO</h1>
                    <p style="margin-bottom: 20px; font-size: 1.1rem; opacity: 0.9;">Escribe tu nombre para entrar</p>
                    <input type="text" id="username-input" placeholder="Tu nombre (Ej: Jens)...">
                    <button class="footer-pill" onclick="goToCreator()">Siguiente ➡️</button>
                </div>
            </div>

            <div id="view-avatar-creator" class="sub-view">
                <div class="avatar-creator-box">
                    <h2 style="font-family: var(--font-title); font-size: 3rem; margin-bottom: 20px;">ELIGE TU HÉROE</h2>
                    <div class="avatar-creator-grid">
                        <div class="avatar-preview-container" id="live-avatar-preview"></div>
                        <div class="chroma-container">
                            <div class="chroma-title" id="chroma-name-display">Skin: Original</div>
                            <div class="chroma-list" id="chroma-list-container"></div>
                        </div>
                        <div class="avatar-selection-list" id="avatar-grid-container"></div>
                        <button class="footer-pill" style="margin-top:10px; font-size:1.2rem; background:#4caf50;" onclick="saveProfile()">ENTRAR AL JUEGO ⚔️</button>
                    </div>
                </div>
            </div>

            <div id="view-dashboard" class="sub-view">
                <div class="avatar-preview-container" id="dashboard-avatar" style="border:none; width: 250px; height: 250px; background:none;"></div>
                <h1 class="main-title" id="welcome-text" style="margin-top:20px;">HOLA</h1>
                <p id="mood-text" style="font-weight: 800; letter-spacing: 2px; color: var(--accent-color); font-size:1.2rem; text-transform:uppercase;"></p>
                <button onclick="resetProfile()" style="margin-top: 30px; opacity: 0.6; font-size: 0.9rem; text-decoration: underline;">Volver a Elegir Personaje</button>
            </div>
        </div>

        <!-- DICCIONARIO HÍBRIDO (OFFLINE + IA DE RESPALDO) -->
        <div id="diccionario" class="tab-content">
            <h1 class="main-title">SMART ORDBOG</h1>
            <p style="text-align:center; margin-bottom:20px; font-weight:bold; font-size:1.2rem;">Gør din avatar glad ved at søge <span class="emoji-interactive">📖</span></p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar palabra / Søg (Ej: Hola, Perro)..." onkeyup="if(event.key==='Enter') triggerSearch()">
                <button class="footer-pill" onclick="triggerSearch()" style="width:auto; padding: 12px 30px;">BUSCAR</button>
                <div id="dict-avatar-widget" class="dict-avatar" style="display: none;"></div>
            </div>
            <div id="vocabGrid" class="vocab-grid"></div>
        </div>

        <!-- TABLÓN (USA IA SOLO PARA EL PROFESOR) -->
        <div id="notas" class="tab-content">
            <h1 class="main-title">EL TABLÓN</h1>
            <div id="admin-muro-panel" class="admin-panel" style="display:none; margin-bottom: 30px;">
                <h3 style="color:#ff0055; margin-bottom:15px; font-size:1.5rem;">👨‍🏫 Panel de Profesor</h3>
                <textarea id="adminPostText" placeholder="Escribe las palabras de hoy (separadas por comas)..." style="height:100px; margin-bottom:15px;"></textarea>
                <button class="footer-pill" onclick="publishMuroPost()">PUBLICAR EJERCICIOS ✨</button>
                <div id="admin-loading" style="display:none; margin-top:15px; color:#ff0055; font-weight:bold;">Construyendo pizarra interactiva...</div>
            </div>
            <div id="student-muro-display" style="width:100%"></div>
        </div>

        <!-- JUEGOS -->
        <div id="juegos" class="tab-content">
            <h1 class="main-title">SPIL / JUEGOS <span class="emoji-interactive">🎮</span></h1>
            <div class="auth-box" style="padding:60px">
                <div class="emoji-interactive" style="font-size: 5rem; margin-bottom:20px">🚧</div>
                <h2 style="color:var(--accent-color); font-size: 3rem;">KOMMER SNART!</h2>
                <p style="font-size:1.2rem;">Estamos construyendo algo épico para vosotros.</p>
            </div>
        </div>

    </main>

    <script>
        // ======================================================================
        // CONFIGURACI ( A GITHUB)
        // ======================================================================
        const parte1 = "AIzaSyBg6S"; // <-- P
        const parte2 = "cdadvvls1rwTw1ubwcTKPS6F0QRPA"; // <-- Pega aqu
        const apiKey = parte1 + parte2; 

        /* ======================================================================
           PRONUNCIACIÓN (Web Speech API)
           ====================================================================== */
        function hablarPalabra(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const mensaje = new SpeechSynthesisUtterance(texto);
                mensaje.lang = 'es-ES';
                mensaje.rate = 0.9;

        let tempName = "";
        let selectedAvatarIndex = 0;
        let selectedChromaId = 'classic';
        let globalProfile = JSON.parse(localStorage.getItem('user_profile_data'));

        function renderAvatarGrid() {
            const container = document.getElementById('avatar-grid-container');
            container.innerHTML = '';
            heroesList.forEach((h, i) => {
                const opt = document.createElement('div');
                opt.className = 'avatar-option' + (i === selectedAvatarIndex ? ' selected' : '');
                opt.innerHTML = generateHeroSVG(h.id, selectedChromaId);
                const name = document.createElement('div');
                name.className = 'avatar-option-name';
                name.innerText = h.name;
                
                const ch = chromas.find(c => c.id === selectedChromaId);
                name.style.color = ch.id === 'classic' ? h.c.m : ch.main;
                
                opt.appendChild(name);
                opt.onclick = () => selectAvatar(i);
                container.appendChild(opt);
            });
            updatePreview();
        }

        function renderChromas() {
            const container = document.getElementById('chroma-list-container');
            container.innerHTML = '';
            chromas.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'chroma-btn' + (c.id === selectedChromaId ? ' selected' : '');
                btn.style.background = c.bg;
                btn.title = c.name;
                btn.onclick = () => {
                    selectedChromaId = c.id;
                    document.getElementById('chroma-name-display').innerText = `Skin: ${c.name}`;
                    renderChromas();
                    renderAvatarGrid();
                };
                container.appendChild(btn);
            });
        }

        function selectAvatar(index) {
            selectedAvatarIndex = index;
            renderAvatarGrid(); 
        }

        function updatePreview() {
            document.getElementById('live-avatar-preview').innerHTML = generateHeroSVG(heroesList[selectedAvatarIndex].id, selectedChromaId);
        }

        /* ======================================================================
           FLUJO DE VISTAS (LOGIN -> SELECCIÓN -> DASHBOARD)
           ====================================================================== */
        function showSubView(viewId) {
            document.querySelectorAll('.sub-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function goToCreator() {
            tempName = document.getElementById('username-input').value.trim();
            if(!tempName) return alert("¡Dime tu nombre primero!");
            
            if(tempName === "AdminProfe") {
                globalProfile = { name: "Profesor", is_admin: true, avatarIndex: 'admin', chromaId: 'classic', lastTime: Date.now() };
                localStorage.setItem('user_profile_data', JSON.stringify(globalProfile));
                loadDashboard(); 
                return;
            }
            
            showSubView('view-avatar-creator');
            renderChromas();
            renderAvatarGrid();
        }

        function saveProfile() {
            globalProfile = { name: tempName, avatarIndex: selectedAvatarIndex, chromaId: selectedChromaId, is_admin: false, lastTime: Date.now() };
            localStorage.setItem('user_profile_data', JSON.stringify(globalProfile));
            loadDashboard();
        }

        function loadDashboard() {

        /* ======================================================================
           NUEVO MOTOR DEL DICCIONARIO: BÚSQUEDA EN BASE DE DATOS LOCAL + IA
           ====================================================================== */
        async function triggerSearch() {
            let term = document.getElementById('searchInput').value.trim().toLowerCase();
            if(!term) return;
            
            const grid = document.getElementById('vocabGrid');
            const loadingId = 'loading-' + Date.now();
            
            // Mostrar tarjeta de búsqueda visual
            const loadingHtml = `<div id="${loadingId}" class="vocab-card" style="text-align:center;">Søger efter "<b>${term}</b>"... 📚✨</div>`;
            grid.insertAdjacentHTML('afterbegin', loadingHtml);
            document.getElementById('searchInput').value = '';
            
            const normalizedTerm = term.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            // PASO 1: BÚSQUEDA LOCAL (INSTANTÁNEA)
            let dbKey = Object.keys(baseDeDatosDiccionario).find(k =>
                k.normalize("NFD").replace(/[\u0300-\u036f]/g, "") === normalizedTerm ||
                baseDeDatosDiccionario[k].es.toLowerCase().includes(term) ||
                baseDeDatosDiccionario[k].da.toLowerCase().includes(term)
            );

            if (dbKey) {
                setTimeout(() => renderDictCard(baseDeDatosDiccionario[dbKey], loadingId), 300);
                return; // Cortamos aquí si la encontró en local
            }

            // PASO 2: BÚSQUEDA EN CACHÉ (Palabras que la IA ya buscó antes)
            let cache = JSON.parse(localStorage.getItem('dict_cache') || '{}');
            if (cache[normalizedTerm]) {
                setTimeout(() => renderDictCard(cache[normalizedTerm], loadingId), 300);
                return;
            }

            // PASO 3: BÚSQUEDA EN IA (Para palabras nuevas como "zapato")
            if(!apiKey) {
                document.getElementById(loadingId).outerHTML = `
                    <div class="vocab-card" style="background:rgba(255,255,255,0.1); border-color:#ff9800;">
                        <p style="color:#ff9800; text-align:center; font-weight:bold; font-size:1.2rem; margin-bottom:10px;">🤔 ORD IKKE FUNDET (Palabra no encontrada)</p>
                        <p style="text-align:center; font-size:1.1rem;">No se encontró "<b>${term}</b>".</p>
                        <p style="text-align:center; font-size:0.9rem; margin-top:10px; opacity:0.8;">La API de inteligencia artificial no está configurada para buscarla en internet.</p>
                    </div>`; 
                return;
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            try {
                const res = await fetch(url, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        contents: [{parts: [{text: `Palabra a traducir: ${term}`}]}],
                        systemInstruction: { parts: [{ text: "Eres un profesor de español para estudiantes daneses. Responde estricta y ÚNICAMENTE con un JSON válido usando estas claves exactas: 'es' (palabra en español con artículo El/La), 'da' (traducción al danés), 'plural' (plural en danés), 'emoji' (1 solo emoji representativo), 'mnemo' (mnemotecnia o truco en danés para recordar la palabra), 'chunk' (frase corta de ejemplo en español), 'chunk_da' (traducción de la frase al danés)." }]},
                        generationConfig: { responseMimeType: "application/json", temperature: 0.2 }
                    }) 
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || "La petición fue rechazada por Google.");
                if (!data.candidates) throw new Error("No hay respuesta válida de la IA.");
                
                const word = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // Guardar la palabra nueva en la caché para el futuro
                cache[normalizedTerm] = word;
                localStorage.setItem('dict_cache', JSON.stringify(cache));

                renderDictCard(word, loadingId);
            } catch(e) { 
                document.getElementById(loadingId).outerHTML = `
                    <div class="vocab-card" style="background:rgba(255,0,0,0.1); border-color:#ff4444;">
                        <p style="color:#ff4444; text-align:center; font-weight:bold; font-size:1.2rem; margin-bottom:10px;">⚠️ ERROR DE IA</p>
                        <p style="text-align:center; font-size:0.9rem;">No se pudo traducir "<b>${term}</b>" con la IA.</p>
                        <p style="text-align:center; font-size:0.8rem; margin-top:10px; color:#aaa;">Detalle: ${e.message}</p>
                    </div>`; 
            }
        }

        // Función que dibuja la carta
        function renderDictCard(word, loadingId) {
            const cardHtml = `
                <div class="vocab-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2 style="font-size: 2.5rem; margin-bottom:10px;">${word.emoji} ${word.es}</h2>
                        <button class="audio-btn" onclick="hablarPalabra('${word.es}')">🔊</button>
                    </div>
                    <span class="dict-badge">Flertal: ${word.plural}</span>
                    <p style="font-weight:900; color:var(--accent-color); font-size:1.8rem; margin:15px 0;">🇩🇰 ${word.da}</p>
                    <div style="background:rgba(0,0,0,0.2); padding:20px; border-radius:12px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="font-size:1.2rem; font-style:italic; margin-bottom:10px;">"${word.chunk}"</div>
                            <button class="audio-btn" style="width:35px; height:35px; font-size:0.9rem;" onclick="hablarPalabra('${word.chunk.replace(/'/g, "\\'")}')">🔊</button>
                        </div>
                        <div style="font-weight:bold;">🇩🇰 ${word.chunk_da}</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.1); padding:15px; border-left:4px solid #fcd000; margin-top:15px; border-radius:8px;">
                        🧠 <b>Husk det:</b> ${word.mnemo}
                    </div>
                </div>`;
                
            document.getElementById(loadingId).outerHTML = cardHtml;
            
            if(!globalProfile || !globalProfile.is_admin) {
                const widg = document.getElementById('dict-avatar-widget');
                if(widg) {
                    widg.style.transform = 'scale(1.3) rotate(5deg)';
                    setTimeout(() => widg.style.transform = '', 800);
                }
            }
        }

        function resetProfile() { if(confirm("¿Seguro? Se borrarán tus datos y tu personaje.")) { localStorage.clear(); location.reload(); } }
        
        function toggleTheme() {
            const isDark = document.body.classList.contains('dark-mode');
            if(!isDark) {
                document.getElementById('lightning-overlay').classList.add('lightning-active');
                setTimeout(() => { document.body.classList.add('dark-mode'); localStorage.setItem('theme', 'dark'); renderAvatarGrid(); }, 150);
                setTimeout(() => document.getElementById('lightning-overlay').classList.remove('lightning-active'), 500);
            } else {
                document.getElementById('soft-fade-overlay').classList.add('soft-fade-active');
                setTimeout(() => { document.body.classList.remove('dark-mode'); localStorage.setItem('theme', 'light'); renderAvatarGrid(); document.getElementById('soft-fade-overlay').classList.remove('soft-fade-active'); }, 800);
            }
        }

        /* ======================================================================
           TABLÓN Y EJERCICIOS (SOLO EL PROFESOR USA LA IA AQUÍ)
           ====================================================================== */
        async function publishMuroPost() {
            const text = document.getElementById('adminPostText').value.trim();
            if(!text) return;
            if(!apiKey) return alert("Falta la clave API del profesor en el código.");
            document.getElementById('admin-loading').style.display = 'block';

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            try {
                const res = await fetch(url, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        contents: [{parts: [{text: `Vocabulario: ${text}`}]}],
                        systemInstruction: { parts: [{text: "Crea 4 ejercicios para aprender español. Genera ÚNICAMENTE un JSON válido con esta estructura: {'vocab': ['palabra1', 'palabra2'], 'exercises': [{'da': 'frase en danés', 'es_before': 'inicio de frase ', 'es_after': ' fin de frase', 'answer': 'palabra1'}]}"}]},
                        generationConfig: { responseMimeType: "application/json", temperature: 0.2 }
                    }) 
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || "La petición fue rechazada.");
                
                const aiData = JSON.parse(data.candidates[0].content.parts[0].text);
                localStorage.setItem('muro_latest_post', JSON.stringify({ ...aiData, date: new Date().toLocaleDateString() }));
                document.getElementById('adminPostText').value = '';
                document.getElementById('admin-loading').style.display = 'none';
                loadMuroData();
            } catch (e) { 
                document.getElementById('admin-loading').innerHTML = `<span style="color:#ff4444;">Error de IA: ${e.message}</span>`;
            }
        }

        // Función para cargar los ejercicios guardados o los nuevos
        function loadMuroData() {
            const data = JSON.parse(localStorage.getItem('muro_latest_post'));
            const display = document.getElementById('student-muro-display');
            if(!data || !data.vocab) {
                display.innerHTML = "<p style='text-align:center; opacity:0.6'>Der er ingen opgaver i dag. (No hay tareas hoy)</p>";
                return;
            }

            // Generamos el Avatar del usuario para que lo acompañe (O el del profe)
            const avatarSvg = (globalProfile && globalProfile.is_admin) ? '<div style="font-size:5rem; text-align:center; line-height:100px;">👨‍🏫</div>' : (globalProfile ? generateHeroSVG(heroesList[globalProfile.avatarIndex].id, globalProfile.chromaId) : '');

            display.innerHTML = `
                <div class="muro-layout">
                    <!-- AVATAR AL LADO DEL TABLÓN -->
                    <div class="muro-avatar-wrapper" id="muro-avatar-container">
                        ${avatarSvg}
                    </div>

                    <!-- TABLÓN PRINCIPAL -->
                    <div class="muro-paper">
                        <div style="font-size:0.8rem; opacity:0.6; margin-bottom:10px;">I dag ${data.date}</div>
                        <p style="font-size:1.5rem; font-weight:bold; margin-bottom:20px;">Tak for i dag! I er meget dygtige 🌟</p>
                        
                        <div style="margin-bottom:30px">${data.vocab.map(v => `<div style="font-size:1.2rem; font-weight:bold; margin-bottom:10px;">✓ ${v}</div>`).join('')}</div>
                        
                        <h4 style="margin-top: 40px; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 20px; font-size: 1.5rem;">🎮 Træk og slip (Toca para mover)</h4>
                        <p style="font-size:0.9rem; opacity:0.7; margin-bottom:15px;">Tryk på et ord, og tryk derefter på en tom plads.</p>
                        
                        <!-- BANCO DE PALABRAS -->
                        <div class="word-bank" id="word-bank">
                            ${data.vocab.sort(() => Math.random()-0.5).map((v, i) => `<span class="draggable-word" onclick="handleWordClick(event)" id="w-${i}">${v}</span>`).join('')}
                        </div>
                        
                        <!-- EJERCICIOS -->
                        <div id="exercises-container">
                            ${data.exercises.map((ex, i) => `
                                <div style="margin-bottom:25px">
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                                        <div style="color:#777; font-style:italic;">🇩🇰 ${ex.da}</div>
                                        <button class="audio-btn" style="width:30px; height:30px; font-size:0.8rem;" onclick="hablarPalabra('${ex.es_before.replace(/'/g, "\\'") + ex.answer + ex.es_after.replace(/'/g, "\\'")}')">🔊</button>
                                    </div>
                                    <div style="font-size:1.3rem; font-weight:bold;">
                                        ${ex.es_before} 
                                        <span class="drop-zone" onclick="handleZoneClick(event)" data-answer="${ex.answer}"></span> 
                                        ${ex.es_after}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <!-- ZONA DE FEEDBACK Y BOTONES -->
                        <div id="muro-feedback" style="margin: 20px 0; font-weight: bold; font-size: 1.2rem; text-align: center;"></div>
                        
                        <div style="display:flex; gap:10px; flex-direction:column;">
                            <button class="footer-pill" onclick="checkMuro()">COMPLETAR MISIÓN ✅</button>
                            <button id="btn-more-ex" class="footer-pill" style="background:#555; font-size:0.9rem;" onclick="generateMoreExercises()">➕ FLERE OPGAVER (Más Ejercicios)</button>
                        </div>
                    </div>
                </div>`;
        }

        /* LÓGICA DE TOCAR Y MOVER (PERFECTO PARA MÓVILES) */
        let selectedWordElement = null;

        function handleWordClick(ev) {
            const word = ev.target;
            // Si la palabra ya está en un hueco, la devolvemos al banco
            if(word.parentElement.classList.contains('drop-zone')) {
                document.getElementById('word-bank').appendChild(word);
                word.parentElement.classList.remove('filled');
                word.classList.remove('word-selected');
                selectedWordElement = null;
            } else {
                // Si está en el banco, la seleccionamos
                if (selectedWordElement) selectedWordElement.classList.remove('word-selected');
                selectedWordElement = word;
                word.classList.add('word-selected');
            }
        }

        function handleZoneClick(ev) {
            const zone = ev.currentTarget;
            // Si hemos seleccionado una palabra y el hueco está vacío, la metemos
            if (selectedWordElement && !zone.classList.contains('filled')) {
                zone.appendChild(selectedWordElement);
                zone.classList.add('filled');
                selectedWordElement.classList.remove('word-selected');
                selectedWordElement = null;
            } else if (zone.children.length > 0) {
                // Si tocamos un hueco lleno sin tener nada seleccionado, sacamos la palabra
                const word = zone.children[0];
                document.getElementById('word-bank').appendChild(word);
                zone.classList.remove('filled');
            }
        }

        /* COMPROBAR RESPUESTAS Y ANIMAR CORAZONES */
        function checkMuro() {
            let allCorrect = true;
            let answered = 0;
            const zones = document.querySelectorAll('.drop-zone');
            if(zones.length === 0) return;

            zones.forEach(z => {
                if(z.children.length > 0) {
                    answered++;
                    const wordEl = z.children[0];
                    const ok = wordEl.innerText.toLowerCase() === z.getAttribute('data-answer').toLowerCase();
                    wordEl.style.border = ok ? "2px solid #4caf50" : "2px solid #ff0055";
                    wordEl.style.background = ok ? "#4caf50" : "#ff0055";
                    if(!ok) allCorrect = false;
                } else {
                    allCorrect = false;
                }
            });

            const feedback = document.getElementById('muro-feedback');
            
            if (answered < zones.length) {
                feedback.innerHTML = "<span style='color:#ff9800;'>Udfyld alle felterne først! (Rellena todos los huecos)</span>";
                return;
            }

            if(allCorrect) {
                feedback.innerHTML = "<span style='color:#4caf50;'>Fantastisk! Det er helt rigtigt! 🌟💖</span>";
                spawnHearts(); // Dispara los corazones
            } else {
                feedback.innerHTML = "<span style='color:#ff0055;'>Næsten! Prøv igen. 💪 (Casi, inténtalo de nuevo)</span>";
            }
        }

        function spawnHearts() {
            const container = document.getElementById('muro-avatar-container');
            if(!container) return;
            for(let i=0; i<6; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerText = '💖';
                    heart.style.left = (Math.random() * 80) + '%';
                    heart.style.bottom = '20px';
                    container.appendChild(heart);
                    setTimeout(() => heart.remove(), 1500); // Se borran solos
                }, i * 200);
            }
        }

        /* GENERAR MÁS EJERCICIOS */
        async function generateMoreExercises() {
            const data = JSON.parse(localStorage.getItem('muro_latest_post'));
            if(!data || !data.vocab || !apiKey) return alert("Falta la API Key o no hay vocabulario.");
            
            const btn = document.getElementById('btn-more-ex');
            btn.innerText = "Henter... ⏳ (Cargando...)";
            btn.disabled = true;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const prompt = `Crea 3 nuevos ejercicios de rellenar huecos para aprender español usando SOLO estas palabras: ${data.vocab.join(', ')}. Formato JSON estricto: {"exercises": [{"da": "frase en danés", "es_before": "inicio de frase ", "es_after": " fin de frase", "answer": "palabra"}]}`;

            try {
                const res = await fetch(url, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        contents: [{parts: [{text: prompt}]}],
                        generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
                    }) 
                });
                
                const responseData = await res.json();
                if (!res.ok) throw new Error("API error");
                
                const newEx = JSON.parse(responseData.candidates[0].content.parts[0].text);
                data.exercises = data.exercises.concat(newEx.exercises); // Junta los viejos con los nuevos
                localStorage.setItem('muro_latest_post', JSON.stringify(data));
                
                loadMuroData(); // Recarga todo el tablón visualmente
            } catch (e) {
                alert("Kunne ikke hente flere opgaver. (No se pudieron cargar).");
                btn.innerText = "➕ FLERE OPGAVER";
                btn.disabled = false;
            }
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            };
        });

        window.onload = () => {
            if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark-mode');
            loadDashboard();
        };
    </script>
</body>
</html>
